<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardápio Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#fafaf8; --surface:#fff; --border:#e8e4e0;
    --accent:#c0392b; --accent2:#a93226; --accent-light:#fdf2f1;
    --text:#1a1a1a; --muted:#888480; --green:#27ae60;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; }

  header {
    background:#fff; border-bottom:3px solid var(--accent);
    padding:0 24px; display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:100; height:68px;
    box-shadow:0 2px 12px rgba(192,57,43,.08);
  }
  .logo-area { display:flex; align-items:center; gap:12px; }
  .logo-img  { width:46px; height:46px; border-radius:50%; object-fit:cover; border:2px solid var(--accent); display:none; }
  .logo-img.loaded { display:block; }
  .logo-text { font-family:'Playfair Display',serif; font-size:21px; color:var(--accent); font-weight:800; }
  .logo-sub  { font-size:11px; color:var(--muted); }

  .hero { background:linear-gradient(135deg,var(--accent),var(--accent2)); padding:36px 24px; text-align:center; color:#fff; }
  .hero h1 { font-family:'Playfair Display',serif; font-size:30px; margin-bottom:6px; }
  .hero p  { font-size:14px; opacity:.85; }

  .tabs { display:flex; gap:8px; padding:18px 24px 0; overflow-x:auto; scrollbar-width:none; max-width:900px; margin:0 auto; }
  .tab { background:#fff; border:1.5px solid var(--border); border-radius:50px; padding:8px 20px; font-size:13px; font-weight:600; color:var(--muted); cursor:pointer; white-space:nowrap; transition:.2s; }
  .tab:hover { border-color:var(--accent); color:var(--accent); }
  .tab.active { background:var(--accent); border-color:var(--accent); color:#fff; }

  .menu { max-width:900px; margin:0 auto; padding:22px 24px 220px; }
  .category { margin-bottom:34px; }
  .category-title {
    font-family:'Playfair Display',serif; font-size:21px; color:var(--accent);
    margin-bottom:14px; padding-bottom:10px; border-bottom:2px solid var(--accent-light);
    display:flex; align-items:center; gap:10px;
  }
  .category-title::before { content:''; display:block; width:4px; height:22px; background:var(--accent); border-radius:2px; }
  .products { display:grid; gap:12px; }

  .product-card {
    background:#fff; border:1.5px solid var(--border); border-radius:14px;
    overflow:hidden; display:flex; align-items:stretch;
    transition:.2s; box-shadow:0 1px 4px rgba(0,0,0,.04);
  }
  .product-card:hover { border-color:var(--accent); box-shadow:0 4px 16px rgba(192,57,43,.1); }

  .product-thumb {
    width:110px; min-height:100px; flex-shrink:0;
    background:var(--accent-light); display:flex; align-items:center; justify-content:center;
    font-size:32px; overflow:hidden;
  }
  .product-thumb img { width:100%; height:100%; object-fit:cover; }

  .product-body { flex:1; padding:14px 16px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .product-info { flex:1; }
  .product-name { font-weight:700; font-size:15px; margin-bottom:3px; }
  .product-desc { color:var(--muted); font-size:13px; margin-bottom:8px; line-height:1.4; }
  .product-price { color:var(--accent); font-weight:700; font-size:18px; }

  .qty-control { display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .qty-btn {
    background:var(--accent-light); border:1.5px solid #e8c5c2; color:var(--accent);
    width:34px; height:34px; border-radius:50%; font-size:20px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:.2s; line-height:1;
  }
  .qty-btn:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
  .qty-num { font-weight:700; font-size:15px; min-width:20px; text-align:center; }

  /* BARRA FLUTUANTE */
  .bottom-bar {
    position:fixed; bottom:-100px; left:0; right:0;
    background:#fff; border-top:3px solid var(--accent);
    padding:14px 24px; z-index:100;
    box-shadow:0 -4px 20px rgba(0,0,0,.1);
    transition:.35s cubic-bezier(.4,0,.2,1);
  }
  .bottom-bar.visible { bottom:0; }
  .bottom-bar-inner { max-width:900px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:16px; }
  .bar-left .label { font-size:12px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.05em; }
  .bar-left .total { font-size:22px; font-weight:700; color:var(--accent); }
  .finalizar-btn {
    background:var(--accent); color:#fff; border:none; border-radius:12px;
    padding:14px 32px; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:700;
    cursor:pointer; transition:.2s; white-space:nowrap;
  }
  .finalizar-btn:hover { background:var(--accent2); transform:translateY(-1px); }

  /* MODAL */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:200; display:none; align-items:flex-end; justify-content:center; }
  .overlay.open { display:flex; }
  .modal {
    background:#fff; border-radius:24px 24px 0 0;
    width:100%; max-width:600px; max-height:94vh; overflow-y:auto;
    padding:28px 24px 36px; animation:up .3s ease;
  }
  @keyframes up { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .modal-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
  .modal-head h2 { font-family:'Playfair Display',serif; font-size:22px; color:var(--accent); }
  .close-btn { background:none; border:none; font-size:30px; cursor:pointer; color:var(--muted); line-height:1; }

  .resumo { background:var(--accent-light); border-radius:12px; padding:16px; margin-bottom:20px; }
  .resumo-row { display:flex; justify-content:space-between; font-size:14px; padding:5px 0; }
  .resumo-row:not(:last-child) { border-bottom:1px solid #f0d5d3; }
  .resumo-total { display:flex; justify-content:space-between; font-size:17px; font-weight:700; margin-top:10px; padding-top:10px; border-top:2px solid var(--accent); color:var(--accent); }

  .fg { margin-bottom:14px; }
  .fg label { display:block; font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:6px; }
  .fg input, .fg textarea {
    width:100%; background:var(--bg); border:1.5px solid var(--border);
    border-radius:10px; padding:12px 14px; color:var(--text);
    font-family:'DM Sans',sans-serif; font-size:15px; transition:.2s;
  }
  .fg input:focus, .fg textarea:focus { outline:none; border-color:var(--accent); background:#fff; }
  .fg textarea { resize:none; height:90px; line-height:1.5; }

  .send-btn {
    width:100%; background:var(--accent); color:#fff; border:none; border-radius:14px;
    padding:16px; font-family:'DM Sans',sans-serif; font-size:16px; font-weight:700;
    cursor:pointer; transition:.2s; margin-top:4px;
    display:flex; align-items:center; justify-content:center; gap:10px;
  }
  .send-btn:hover { background:var(--accent2); }
  .send-btn:disabled { opacity:.5; cursor:not-allowed; }

  .toast {
    position:fixed; bottom:110px; left:50%; transform:translateX(-50%);
    background:var(--green); color:#fff; padding:12px 24px; border-radius:50px;
    font-weight:600; font-size:14px; z-index:500; opacity:0; transition:.3s;
    pointer-events:none; white-space:nowrap;
  }
  .toast.show { opacity:1; }
  .toast.err  { background:var(--accent); }
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <img class="logo-img" id="logoImg" src="" alt="Logo">
    <div>
      <div class="logo-text" id="nomeLojaTexto">Cardápio Digital</div>
      <div class="logo-sub">Faça seu pedido</div>
    </div>
  </div>
</header>

<div class="hero">
  <h1>Nosso Cardápio</h1>
  <p>Escolha os itens e clique em Finalizar pedido</p>
</div>

<div class="tabs" id="tabs"></div>
<div class="menu"  id="menu"><p style="color:var(--muted);padding:40px;text-align:center">Carregando...</p></div>

<div class="bottom-bar" id="bottomBar">
  <div class="bottom-bar-inner">
    <div class="bar-left">
      <div class="label" id="barInfo">0 itens selecionados</div>
      <div class="total" id="barTotal">R$ 0,00</div>
    </div>
    <button class="finalizar-btn" onclick="abrirModal()">Finalizar pedido</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <h2>Finalizar pedido</h2>
      <button class="close-btn" onclick="fecharModal()">×</button>
    </div>
    <div class="resumo" id="resumo"></div>
    <div class="fg"><label>Seu nome *</label><input type="text" id="nomeCliente" placeholder="Como devemos te chamar?"></div>
    <div class="fg"><label>Seu WhatsApp</label><input type="tel" id="telefone" placeholder="(61) 99999-9999"></div>
    <div class="fg">
      <label>Observações</label>
      <textarea id="observacao" placeholder="Alguma alergia, preferência ou pedido especial? Escreva aqui..."></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="enviarPedido()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Enviar pelo WhatsApp
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api';
const WPP = '5561995736193';
let cardapio = [], cart = {};

async function loadCardapio() {
  try {
    const r = await fetch(`${API}/cardapio`);
    cardapio = await r.json();
    try {
      const cr = await fetch(`${API}/config`);
      const c  = await cr.json();
      if (c.nome_loja) document.getElementById('nomeLojaTexto').textContent = c.nome_loja;
      if (c.logo_url)  { const i = document.getElementById('logoImg'); i.src = c.logo_url; i.onload = () => i.classList.add('loaded'); }
    } catch(e){}
    renderTabs(); renderMenu();
  } catch(e) {
    document.getElementById('menu').innerHTML = '<p style="color:red;padding:40px;text-align:center">Erro ao conectar. Verifique se o servidor está rodando.</p>';
  }
}

function renderTabs() {
  document.getElementById('tabs').innerHTML = cardapio.map((c,i) =>
    `<div class="tab ${i===0?'active':''}" onclick="goTo('cat-${c.id}',this)">${c.nome}</div>`
  ).join('');
}

function goTo(id, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(id)?.scrollIntoView({behavior:'smooth',block:'start'});
}

function renderMenu() {
  document.getElementById('menu').innerHTML = cardapio.map(cat=>`
    <div class="category" id="cat-${cat.id}">
      <div class="category-title">${cat.nome}</div>
      <div class="products">
        ${cat.produtos.map(p=>`
          <div class="product-card">
            <div class="product-thumb">
              ${p.foto_url ? `<img src="${p.foto_url}" alt="${p.nome}">` : '🍽️'}
            </div>
            <div class="product-body">
              <div class="product-info">
                <div class="product-name">${p.nome}</div>
                <div class="product-desc">${p.descricao||''}</div>
                <div class="product-price">R$ ${p.preco.toFixed(2).replace('.',',')}</div>
              </div>
              <div class="qty-control">
                <button class="qty-btn" onclick="chg(${p.id},-1,${p.preco},'${p.nome.replace(/'/g,"\\'")}')">−</button>
                <span class="qty-num" id="qty-${p.id}">0</span>
                <button class="qty-btn" onclick="chg(${p.id},1,${p.preco},'${p.nome.replace(/'/g,"\\'")}')">+</button>
              </div>
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

function chg(id, d, preco, nome) {
  const q = (cart[id]?.quantidade||0)+d;
  if (q<=0) delete cart[id]; else cart[id]={produto_id:id,nome,preco,quantidade:q};
  const el=document.getElementById(`qty-${id}`); if(el) el.textContent=cart[id]?.quantidade||0;
  updateBar();
}

function updateBar() {
  const its=Object.values(cart);
  const tot=its.reduce((s,i)=>s+i.preco*i.quantidade,0);
  const cnt=its.reduce((s,i)=>s+i.quantidade,0);
  document.getElementById('bottomBar').classList.toggle('visible',cnt>0);
  document.getElementById('barInfo').textContent=`${cnt} ${cnt===1?'item':'itens'} selecionados`;
  document.getElementById('barTotal').textContent='R$ '+tot.toFixed(2).replace('.',',');
}

function abrirModal() {
  const its=Object.values(cart); if(!its.length) return;
  const tot=its.reduce((s,i)=>s+i.preco*i.quantidade,0);
  document.getElementById('resumo').innerHTML=
    its.map(i=>`<div class="resumo-row"><span>${i.quantidade}x ${i.nome}</span><span>R$ ${(i.preco*i.quantidade).toFixed(2).replace('.',',')}</span></div>`).join('')+
    `<div class="resumo-total"><span>Total</span><span>R$ ${tot.toFixed(2).replace('.',',')}</span></div>`;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function fecharModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}

async function enviarPedido() {
  const nome=document.getElementById('nomeCliente').value.trim();
  const tel =document.getElementById('telefone').value.trim();
  const obs =document.getElementById('observacao').value.trim();
  const its =Object.values(cart);
  if(!nome){toast('Informe seu nome!',true);return;}
  const btn=document.getElementById('sendBtn'); btn.disabled=true;
  try {
    const r=await fetch(`${API}/pedido`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({nome_cliente:nome,telefone:tel,observacao:obs,itens:its.map(i=>({produto_id:i.produto_id,quantidade:i.quantidade}))})});
    const d=await r.json();
    if(!r.ok){toast(d.erro||'Erro ao criar pedido',true);return;}
    let msg=`*Olá! Gostaria de fazer um pedido* 🍽️\n\n*Nome:* ${nome}\n`;
    if(tel) msg+=`*WhatsApp:* ${tel}\n`;
    msg+=`\n*Itens:*\n`;
    its.forEach(i=>msg+=`• ${i.quantidade}x ${i.nome} — R$ ${(i.preco*i.quantidade).toFixed(2).replace('.',',')}\n`);
    msg+=`\n*Total: R$ ${d.total.toFixed(2).replace('.',',')}*`;
    if(obs) msg+=`\n\n*Observações:* ${obs}`;
    msg+=`\n_Pedido #${d.pedido_id}_`;
    window.open(`https://wa.me/${WPP}?text=${encodeURIComponent(msg)}`,'_blank');
    cart={};
    document.querySelectorAll('.qty-num').forEach(e=>e.textContent='0');
    updateBar(); fecharModal();
    document.getElementById('nomeCliente').value='';
    document.getElementById('telefone').value='';
    document.getElementById('observacao').value='';
    toast('Pedido enviado! Abrindo WhatsApp...');
  } finally { btn.disabled=false; }
}

function toast(msg,err=false) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(err?' err':'');
  setTimeout(()=>t.classList.remove('show'),3000);
}

document.getElementById('overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)fecharModal();});
loadCardapio();
</script>
</body>
</html>
