<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Cardápio</title>
<link rel="icon" id="favicon" href="">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F8F9FB;
  --s:#ffffff;
  --bd:#E8EBF0;
  --ac:#FF5A1F;
  --ac2:#e04400;
  --acl:#FFF0EB;
  --tx:#1E293B;
  --mu:#64748B;
  --gr:#10B981;
  --grl:#ECFDF5;
  --rd:#EF4444;
  --rdl:#FEF2F2;
  --pu:#6366F1;
  --r:16px;
  --sh:0 2px 12px rgba(0,0,0,0.08);
  --sh-lg:0 8px 32px rgba(0,0,0,0.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}

/* ── HERO ── */
.hero{
  position:relative;
  height:240px;
  overflow:hidden;
  background:linear-gradient(135deg,#1E293B 0%,#334155 100%);
}
.hero-img{width:100%;height:100%;object-fit:cover;opacity:.6;display:block;}
.hero-ph{width:100%;height:100%;background:linear-gradient(135deg,#1E293B 0%,#334155 50%,#475569 100%);}
.hero-ov{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,
    rgba(0,0,0,0) 0%,
    rgba(0,0,0,.0) 30%,
    rgba(0,0,0,.6) 100%);
}

/* ── LOJA INFO ── */
.loja-section{
  background:var(--s);
  border-bottom:1px solid var(--bd);
  padding-bottom:20px;
  position:relative;
  z-index:2;
  box-shadow:0 1px 0 var(--bd);
}
.loja-inner{max-width:880px;margin:0 auto;padding:0 20px;}

.loja-prof{
  display:flex;
  align-items:flex-end;
  gap:20px;
  margin-top:-56px;
  padding-bottom:16px;
}

.loja-logo{
  width:110px;height:110px;
  border-radius:var(--r);
  border:4px solid var(--s);
  background:var(--s);
  box-shadow:var(--sh-lg);
  overflow:hidden;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:42px;
  position:relative;z-index:4;
}
.loja-logo img{width:100%;height:100%;object-fit:cover;}

.loja-inf{
  padding-top:20px;
  flex:1;min-width:0;
}
.loja-nome{
  font-family:'Nunito',sans-serif;
  font-size:26px;
  font-weight:900;
  color:var(--tx);
  line-height:1.2;
  letter-spacing:-.02em;
  margin-bottom:10px;
  word-break:break-word;
}

.loja-status-wrap{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
.status-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-family:'Inter',sans-serif;
  font-size:12px;font-weight:600;
  padding:5px 14px;border-radius:20px;
  cursor:pointer;letter-spacing:.01em;
  transition:.2s ease;
}
.status-badge:hover{transform:scale(1.02);}
.status-badge.aberto{background:var(--grl);color:var(--gr);border:1px solid #A7F3D0;}
.status-badge.fechado{background:var(--rdl);color:var(--rd);border:1px solid #FECACA;}
.status-badge::before{
  content:'';width:7px;height:7px;
  border-radius:50%;background:currentColor;
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.hor-link{
  font-size:12px;color:var(--mu);cursor:pointer;
  text-decoration:none;
  padding:4px 10px;border-radius:20px;
  border:1px solid var(--bd);
  transition:.2s ease;
  white-space:nowrap;
  font-weight:500;
}
.hor-link:hover{border-color:var(--ac);color:var(--ac);}

/* FECHADO BANNER */
.fechado-banner{
  background:linear-gradient(135deg,#EF4444,#DC2626);
  color:#fff;
  text-align:center;padding:12px 16px;
  font-size:13px;font-weight:600;
  display:none;letter-spacing:.01em;
}
.fechado-banner.show{display:block;}

/* ── POPUP HORÁRIOS ── */
.hor-popup{
  display:none;position:fixed;inset:0;
  background:rgba(15,23,42,.6);
  backdrop-filter:blur(6px);
  z-index:400;align-items:center;justify-content:center;padding:16px;
}
.hor-popup.open{display:flex;}
.hor-box{
  background:var(--s);
  border-radius:24px;
  padding:28px;
  width:100%;max-width:380px;
  box-shadow:var(--sh-lg);
  animation:fadeUp .25s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.hor-box h3{
  font-family:'Nunito',sans-serif;
  font-size:18px;font-weight:800;
  margin-bottom:18px;color:var(--tx);
}
.hor-row{
  display:flex;justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid var(--bd);
  font-size:13px;
}
.hor-row:last-child{border-bottom:none;}
.hor-row .dia{font-weight:600;color:var(--tx);}
.hor-row .hora{color:var(--mu);font-size:12px;}
.hor-row.hoje .dia{color:var(--ac);font-weight:800;}
.hor-row.hoje .hora{color:var(--ac);}
.hor-close{
  width:100%;
  background:var(--tx);color:#fff;
  border:none;border-radius:12px;
  padding:13px;font-size:14px;font-weight:700;
  cursor:pointer;margin-top:18px;
  font-family:'Nunito',sans-serif;
  transition:.2s ease;
}
.hor-close:hover{background:#0F172A;}

/* ── TABS ── */
.tabs-bar{
  position:sticky;top:0;z-index:50;
  background:var(--s);
  border-bottom:2px solid var(--bd);
  box-shadow:0 2px 8px rgba(0,0,0,.04);
}
.tabs-inner{
  max-width:880px;margin:0 auto;
  padding:12px 16px;
  display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;
}
.tabs-inner::-webkit-scrollbar{display:none;}
.tab{
  padding:8px 18px;
  font-family:'Inter',sans-serif;
  font-size:13px;font-weight:600;
  color:var(--mu);cursor:pointer;
  white-space:nowrap;
  border-radius:24px;
  border:2px solid transparent;
  transition:.2s ease;
  flex-shrink:0;
}
.tab:hover{color:var(--tx);background:var(--bg);}
.tab.active{
  color:var(--ac);
  background:var(--acl);
  border-color:var(--ac);
}

/* ── MENU ── */
.menu-w{max-width:880px;margin:0 auto;padding:24px 16px 200px;}
.sec-blk{margin-bottom:36px;}
.sec-tit{
  font-family:'Nunito',sans-serif;
  font-size:18px;font-weight:800;
  margin-bottom:14px;
  padding:0 0 12px;
  border-bottom:2px solid var(--bd);
  color:var(--tx);
  scroll-margin-top:72px;
  display:flex;align-items:center;gap:10px;
}
.sec-tit::before{
  content:'';display:block;
  width:4px;height:20px;
  background:var(--ac);
  border-radius:2px;
}
.prod-list{display:flex;flex-direction:column;gap:12px;}

/* Card produto */
.prod-card{
  background:var(--s);
  border-radius:var(--r);
  border:1.5px solid var(--bd);
  display:flex;overflow:hidden;
  transition:.2s ease;
  box-shadow:var(--sh);
  cursor:default;
}
.prod-card:hover{
  border-color:#CBD5E1;
  box-shadow:0 6px 24px rgba(0,0,0,.1);
  transform:translateY(-1px);
}

.prod-img{
  width:120px;height:120px;
  flex-shrink:0;overflow:hidden;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  font-size:36px;
}
.prod-img img{width:100%;height:100%;object-fit:cover;display:block;}

.prod-body{
  flex:1;padding:14px 16px;
  display:flex;flex-direction:column;justify-content:space-between;
  min-width:0;
}
.prod-name{
  font-family:'Nunito',sans-serif;
  font-size:14px;font-weight:800;
  margin-bottom:4px;line-height:1.35;
  color:var(--tx);
}
.prod-desc{
  color:var(--mu);
  font-size:12px;line-height:1.5;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.prod-foot{
  display:flex;align-items:center;
  justify-content:space-between;
  margin-top:12px;gap:8px;
}
.promo-tag{
  display:inline-flex;align-items:center;gap:4px;
  background:linear-gradient(135deg,#FF5A1F,#e04400);
  color:#fff;font-size:10px;font-weight:700;
  padding:3px 10px 3px 7px;border-radius:20px;
  margin-bottom:5px;line-height:1.4;
  letter-spacing:.02em;
}
.promo-tag-icon{font-size:11px;}
.prod-price-old{
  font-size:11px;color:var(--mu);
  text-decoration:line-through;margin-left:4px;
}
.prod-price{
  font-family:'Nunito',sans-serif;
  font-size:17px;font-weight:900;
  color:var(--ac);
}
.prod-price.promo{color:var(--gr);}

.qty-w{display:flex;align-items:center;gap:8px;}
.qb{
  width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;line-height:1;
  transition:.2s ease;
}
.qb:hover{transform:scale(1.1);}
.qb.plus{
  background:linear-gradient(135deg,var(--ac),var(--ac2));
  color:#fff;
  box-shadow:0 2px 8px rgba(255,90,31,.35);
}
.qb.plus:hover{box-shadow:0 4px 12px rgba(255,90,31,.45);}
.qb.minus{background:var(--bd);color:var(--mu);}
.qb.minus.act{background:var(--acl);color:var(--ac);}
.qn{
  font-family:'Nunito',sans-serif;
  font-weight:800;font-size:15px;
  min-width:22px;text-align:center;
  color:var(--tx);
}

/* ── BARRA CARRINHO ── */
.cart-bar{
  position:fixed;bottom:-110px;left:0;right:0;
  padding:10px 16px 18px;
  z-index:100;
  transition:.38s cubic-bezier(.4,0,.2,1);
}
.cart-bar.up{bottom:0;}
.cart-bar-in{
  max-width:880px;margin:0 auto;
  background:var(--tx);
  border-radius:20px;
  padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  box-shadow:0 12px 48px rgba(0,0,0,.35);
  border:1px solid rgba(255,255,255,.08);
}
.cart-ico{
  position:relative;
  width:44px;height:44px;
  background:rgba(255,255,255,.1);
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.cart-bdg{
  position:absolute;top:-7px;right:-7px;
  background:var(--ac);color:#fff;
  font-size:10px;font-weight:700;
  min-width:19px;height:19px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  padding:0 4px;
  box-shadow:0 2px 4px rgba(255,90,31,.5);
}
.cart-lbl{
  font-size:11px;color:rgba(255,255,255,.5);
  font-weight:600;text-transform:uppercase;
  letter-spacing:.05em;
}
.cart-tot{
  font-family:'Nunito',sans-serif;
  font-size:20px;font-weight:900;color:#fff;
}
.cart-btn{
  background:linear-gradient(135deg,var(--ac),var(--ac2));
  color:#fff;border:none;border-radius:14px;
  padding:12px 26px;
  font-family:'Nunito',sans-serif;
  font-size:14px;font-weight:800;
  cursor:pointer;white-space:nowrap;
  transition:.2s ease;
  box-shadow:0 4px 12px rgba(255,90,31,.4);
}
.cart-btn:hover{transform:scale(1.03);box-shadow:0 6px 16px rgba(255,90,31,.5);}

/* ── MODAL ── */
.overlay{
  position:fixed;inset:0;
  background:rgba(15,23,42,.6);
  backdrop-filter:blur(6px);
  z-index:200;display:none;
  align-items:flex-end;justify-content:center;
}
.overlay.open{display:flex;}
.sheet{
  background:#fff;
  border-radius:28px 28px 0 0;
  width:100%;max-width:640px;
  height:90vh;max-height:90vh;
  overflow-y:auto;overflow-x:hidden;
  animation:sup .3s cubic-bezier(.4,0,.2,1);
  overscroll-behavior:contain;
  -webkit-overflow-scrolling:touch;
}
/* Prevent iOS font size zoom on input focus */
.sheet input,.sheet select,.sheet textarea{font-size:16px!important;}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-pull{
  width:40px;height:4px;
  background:var(--bd);border-radius:2px;
  margin:14px auto 0;
}
.sh-head{
  padding:16px 22px 14px;
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--bd);
}
.sh-head h2{
  font-family:'Nunito',sans-serif;
  font-size:19px;font-weight:800;
  color:var(--tx);
}
.sh-close{
  background:var(--bg);border:none;
  width:34px;height:34px;border-radius:50%;
  font-size:20px;cursor:pointer;
  color:var(--mu);
  display:flex;align-items:center;justify-content:center;
  transition:.2s ease;
}
.sh-close:hover{background:var(--bd);color:var(--tx);}
.sh-body{padding:18px 22px 36px;}

.tipo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.tipo-opt{
  border:2px solid var(--bd);
  background:#fff;border-radius:16px;
  padding:14px;text-align:center;cursor:pointer;
  transition:.2s ease;
}
.tipo-opt:hover{border-color:#CBD5E1;box-shadow:var(--sh);}
.tipo-opt.sel{
  border-color:var(--ac);
  background:var(--acl);
  box-shadow:0 0 0 3px rgba(255,90,31,.12);
}
.tipo-opt .ti{font-size:24px;margin-bottom:6px;}
.tipo-opt .tl{font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;color:var(--tx);}
.tipo-opt .ts{font-size:11px;color:var(--mu);margin-top:3px;}

.resumo-box{
  background:var(--bg);
  border-radius:14px;
  padding:14px 16px;
  margin-bottom:18px;
  border:1.5px solid var(--bd);
}
.r-row{
  display:flex;justify-content:space-between;
  font-size:13px;color:var(--mu);
  padding:5px 0;
}
.r-row:not(:last-child){border-bottom:1px solid var(--bd);}
.r-tot{
  display:flex;justify-content:space-between;
  font-family:'Nunito',sans-serif;
  font-size:17px;font-weight:800;
  margin-top:10px;padding-top:10px;
  border-top:2px solid var(--bd);
  color:var(--ac);
}
.r-row-item{
  display:flex;justify-content:space-between;
  align-items:center;
  padding:8px 0;
  border-bottom:1px solid var(--bd);
}
.r-row-item:last-of-type{border-bottom:none;}
.r-ctrl{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.r-qb{
  width:28px;height:28px;border-radius:8px;
  border:none;cursor:pointer;font-weight:800;
  font-size:15px;display:flex;align-items:center;justify-content:center;
  padding:0;transition:.2s ease;
}
.r-qb:hover{transform:scale(1.1);}
.r-qb.minus{background:var(--bd);color:var(--mu);}
.r-qb.plus{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;}
.r-qb.del{background:var(--rdl);color:var(--rd);font-size:13px;}

.fg{margin-bottom:14px;}
.fg label{
  display:block;
  font-size:11px;font-weight:700;
  color:var(--mu);
  text-transform:uppercase;
  letter-spacing:.07em;
  margin-bottom:7px;
  font-family:'Inter',sans-serif;
}
.fg input,.fg select,.fg textarea{
  width:100%;
  background:var(--bg);
  border:1.5px solid var(--bd);
  border-radius:10px;
  padding:12px 14px;
  color:var(--tx);
  font-family:'Inter',sans-serif;
  font-size:14px;
  transition:.2s ease;
  -webkit-appearance:none;
}
.fg input:focus,.fg select:focus,.fg textarea:focus{
  outline:none;
  border-color:var(--ac);
  background:#fff;
  box-shadow:0 0 0 3px rgba(255,90,31,.12);
}
.fg textarea{resize:none;height:80px;}

.frete-inf{
  background:#EFF6FF;
  border:1.5px solid #BFDBFE;
  border-radius:10px;
  padding:10px 14px;
  font-size:13px;color:#1D4ED8;
  margin-bottom:14px;display:none;
  font-weight:500;
}
.frete-inf.show{display:block;}

.send-btn{
  width:100%;
  background:linear-gradient(135deg,#25D366,#128C7E);
  color:#fff;border:none;
  border-radius:14px;padding:16px;
  font-family:'Nunito',sans-serif;
  font-size:15px;font-weight:800;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:.2s ease;
  box-shadow:0 4px 16px rgba(37,211,102,.35);
}
.send-btn:hover{transform:scale(1.02);box-shadow:0 6px 20px rgba(37,211,102,.45);}
.send-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

.toast{
  position:fixed;bottom:96px;left:50%;transform:translateX(-50%);
  background:var(--tx);color:#fff;
  padding:11px 24px;border-radius:40px;
  font-family:'Inter',sans-serif;
  font-weight:600;font-size:13px;
  z-index:500;opacity:0;transition:.28s;
  pointer-events:none;white-space:nowrap;
  box-shadow:var(--sh-lg);
}
.toast.show{opacity:1;}.toast.err{background:var(--rd);}.toast.ok{background:var(--gr);}

/* ── CUPOM ── */
.cupom-banner{
  position:fixed;bottom:88px;left:50%;transform:translateX(-50%);
  background:rgba(15,23,42,.9);
  backdrop-filter:blur(12px);
  color:#fff;padding:11px 20px;
  border-radius:40px;font-size:13px;font-weight:600;
  z-index:90;box-shadow:var(--sh-lg);
  border:1.5px solid rgba(255,180,0,.4);
  cursor:pointer;display:none;align-items:center;gap:10px;
  animation:cupom-pulse 3s ease-in-out infinite;
  white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;
}
.cupom-banner.show{display:flex;}
@keyframes cupom-pulse{
  0%,100%{box-shadow:var(--sh-lg),0 0 0 0 rgba(255,180,0,.4);}
  50%{box-shadow:var(--sh-lg),0 0 0 8px rgba(255,180,0,0);}
}
.cupom-banner-icon{font-size:18px;flex-shrink:0;}
.cupom-banner-close{
  background:rgba(255,255,255,.15);border:none;color:#fff;
  border-radius:50%;width:22px;height:22px;
  cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:.2s ease;
}
.cupom-banner-close:hover{background:rgba(255,255,255,.25);}
.cupom-row{display:flex;gap:8px;margin-bottom:14px;}
.cupom-row input{
  flex:1;border:1.5px solid var(--bd);
  border-radius:10px;padding:11px 14px;
  font-family:'Inter',sans-serif;
  font-size:14px;text-transform:uppercase;letter-spacing:.05em;
  background:var(--bg);color:var(--tx);
  transition:.2s ease;
}
.cupom-row input:focus{
  outline:none;border-color:var(--ac);
  background:#fff;box-shadow:0 0 0 3px rgba(255,90,31,.12);
}
.cupom-row button{
  background:var(--tx);color:#fff;border:none;
  border-radius:10px;padding:11px 18px;
  font-family:'Nunito',sans-serif;
  font-size:13px;font-weight:800;
  cursor:pointer;white-space:nowrap;
  transition:.2s ease;
}
.cupom-row button:hover{background:#0F172A;}
.cupom-ok{
  background:var(--grl);color:var(--gr);
  border:1px solid #A7F3D0;
  border-radius:10px;padding:9px 14px;
  font-size:13px;font-weight:600;
  margin-bottom:12px;display:none;
}
.cupom-ok.show{display:block;}
.cupom-err{
  background:var(--rdl);color:var(--rd);
  border:1px solid #FECACA;
  border-radius:10px;padding:9px 14px;
  font-size:13px;font-weight:600;
  margin-bottom:12px;display:none;
}
.cupom-err.show{display:block;}

/* ── RESPONSIVO ── */
@media(max-width:600px){
  .hero{height:180px;}
  .loja-logo{width:88px;height:88px;}
  .loja-prof{margin-top:-44px;gap:14px;}
  .loja-nome{font-size:21px;}
  .prod-img{width:100px;height:100px;}
  .prod-name{font-size:13px;}
  .cart-btn{padding:11px 18px;font-size:13px;}
  .sh-head h2{font-size:17px;}
  .sh-body{padding:16px 16px 32px;}
}
@media(max-width:380px){
  .prod-img{width:88px;height:88px;}
}
</style>
</head>
<body>

<!-- HERO BANNER -->
<div class="hero" id="heroW">
  <img id="heroBanner" class="hero-img" src="" alt="" style="display:none">
  <div class="hero-ph" id="heroPh"></div>

<script>
const API='/api';

function maskTel(el){
  let v=el.value.replace(/\D/g,'').slice(0,11);
  if(v.length<=10) v=v.replace(/^(\d{2})(\d{4})(\d{0,4})$/,'($1) $2-$3');
  else v=v.replace(/^(\d{2})(\d{5})(\d{0,4})$/,'($1) $2-$3');
  el.value=v.replace(/-$/,'');
}
let cardapio=[], cart={}, cfg={}, tipoEntrega='retirada', lojaAberta=false;
const DIAS=['domingo','segunda','terca','quarta','quinta','sexta','sabado'];
const DIAS_PT=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];

function verificarHorario(horarios){
  if(!horarios||!Object.keys(horarios).length) return true;
  const now=new Date(), dia=DIAS[now.getDay()], h=horarios[dia];
  if(!h||!h.ativo) return false;
  const [ah,am]=h.abertura.split(':').map(Number);
  const [fh,fm]=h.fechamento.split(':').map(Number);
  const minNow=now.getHours()*60+now.getMinutes();
  return minNow>=(ah*60+am)&&minNow<(fh*60+fm);
}

function atualizarStatusLoja(horarios){
  lojaAberta=verificarHorario(horarios);
  const badge=document.getElementById('statusBadge');
  badge.textContent=lojaAberta?'Aberto agora':'Fechado';
  badge.className='status-badge '+(lojaAberta?'aberto':'fechado');
  document.getElementById('fechadoBanner').classList.toggle('show',!lojaAberta);
  if(!lojaAberta&&horarios){
    const now=new Date();
    const diaIdx=now.getDay();
    const minNow=now.getHours()*60+now.getMinutes();
    let encontrou=false;
    // Procurar próximo horário de abertura nos próximos 7 dias
    for(let i=0;i<7;i++){
      const dIdx=(diaIdx+i)%7;
      const d=DIAS[dIdx];
      const h=horarios[d];
      if(!h||!h.ativo) continue;
      const [ah,am]=h.abertura.split(':').map(Number);
      const minAb=ah*60+am;
      // Se for hoje (i===0): só conta se o horário de abertura ainda não chegou
      // Se for dia futuro (i>0): sempre conta
      if(i===0 && minNow>=minAb) continue; // hoje já passou esse horário
      const nm=i===0?'hoje':i===1?'amanhã':DIAS_PT[dIdx];
      document.getElementById('fechadoMsg').textContent=`Abre ${nm} às ${h.abertura}.`;
      encontrou=true;
      break;
    }
    if(!encontrou) document.getElementById('fechadoMsg').textContent='';
  }
}

function abrirHorarios(){
  const horarios=cfg.horarios||{},diaHoje=DIAS[new Date().getDay()];
  document.getElementById('horContent').innerHTML=DIAS.map((d,i)=>{
    const h=horarios[d],isHoje=d===diaHoje;
    return `<div class="hor-row${isHoje?' hoje':''}">
      <span class="dia">${DIAS_PT[i]}${isHoje?' ★':''}</span>
      <span class="hora">${h&&h.ativo?`${h.abertura} – ${h.fechamento}`:'Fechado'}</span>
    </div>`;
  }).join('');
  document.getElementById('horPopup').classList.add('open');
}
function fecharHorarios(){document.getElementById('horPopup').classList.remove('open');}

// ── CUPOM ────────────────────────────────────────────────────────────────────
let cupomAtivo = null; // {codigo, desconto, tipo_desconto, descricao}

function fecharBanner(){
  document.getElementById('cupomBanner').classList.remove('show');
}

async function aplicarCupom(){
  const codigo = (document.getElementById('inpCupom').value || '').trim().toUpperCase();
  const tel = (document.getElementById('inpTel')?.value || '').trim();
  const okEl = document.getElementById('cupomOk');
  const errEl = document.getElementById('cupomErr');
  okEl.classList.remove('show'); errEl.classList.remove('show');
  if(!codigo){ errEl.textContent='Informe o código do cupom.'; errEl.classList.add('show'); return; }
  try{
    const r = await fetch('/api/cupom/validar', {method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({codigo, telefone: tel})});
    const d = await r.json();
    if(!r.ok){ errEl.textContent = d.erro || 'Cupom inválido'; errEl.classList.add('show'); cupomAtivo=null; buildResumo(); return; }
    cupomAtivo = d;
    const descTxt = d.tipo_desconto==='pct' ? `${d.desconto}% de desconto` : `R$ ${parseFloat(d.desconto).toFixed(2)} de desconto`;
    okEl.textContent = `✅ Cupom "${d.codigo}" aplicado — ${descTxt}!`;
    okEl.classList.add('show');
    buildResumo();
  }catch(e){ errEl.textContent='Erro ao validar cupom. Tente novamente.'; errEl.classList.add('show'); }
}

function calcDescontoCupom(sub){
  if(!cupomAtivo) return 0;
  if(cupomAtivo.tipo_desconto==='pct') return Math.min(sub, sub*(cupomAtivo.desconto/100));
  return Math.min(sub, parseFloat(cupomAtivo.desconto)||0);
}

async function load(){
  try{fetch('/api/visita',{method:'POST'});}catch(e){}

  // Registrar visita única por IP
  try{ fetch('/api/visita',{method:'POST'}); }catch(e){}
  try{
    const [rc,rg]=await Promise.all([fetch(`${API}/cardapio`),fetch(`${API}/config`)]);
    cardapio=await rc.json(); cfg=await rg.json();
    const nome=cfg.nome_loja||'Cardápio';
    document.getElementById('lojaNome').textContent=nome;
    document.getElementById('pageTitle').textContent=nome;
    if(cfg.logo_url){
      document.getElementById('lojaLogo').innerHTML=`<img src="${cfg.logo_url}" alt="logo">`;
      document.getElementById('favicon').href=cfg.logo_url;
    }
    if(cfg.banner_url){
      const img=document.getElementById('heroBanner');
      img.src=cfg.banner_url; img.style.display='block';
      document.getElementById('heroPh').style.display='none';
    }
    if(cfg.frete) document.getElementById('freteDesc').textContent=`+ R$ ${parseFloat(cfg.frete).toFixed(2).replace('.',',')}`;
    atualizarStatusLoja(cfg.horarios);
    renderTabs(); renderMenu();
    setInterval(()=>atualizarStatusLoja(cfg.horarios),60000);
    // Banner cupom cliente novo
    const _cupons = cfg.cupons||[];
    const _cupomNovo = _cupons.find(cu=>cu.tipo==='novo_cliente'&&cu.ativo!==false&&cu.mensagem);
    if(_cupomNovo){
      const _b=document.getElementById('cupomBanner');
      document.getElementById('cupomBannerMsg').textContent=_cupomNovo.mensagem;
      if(_b) _b.classList.add('show');
      _b&&_b.addEventListener('click',e=>{if(!e.target.classList.contains('cupom-banner-close'))abrirModal();});
    }
  }catch(e){
    document.getElementById('menu').innerHTML='<p style="color:var(--rd);padding:48px 0;text-align:center">Erro ao carregar. Tente novamente.</p>';
  }
}

function renderTabs(){
  document.getElementById('tabs').innerHTML=cardapio.map((c,i)=>
    `<div class="tab ${i===0?'active':''}" onclick="goTo('s${c.id}',this)">${c.nome}</div>`
  ).join('');
}

function goTo(id,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  const target=document.getElementById(id);
  if(!target) return;
  const top=target.getBoundingClientRect().top+window.scrollY-72;
  window.scrollTo({top,behavior:'smooth'});
}

function renderMenu(){
  document.getElementById('menu').innerHTML=cardapio.map(cat=>`
    <div class="sec-blk" id="s${cat.id}">
      <div class="sec-tit">${cat.nome}</div>
      <div class="prod-list">${cat.produtos.map(p=>`
        <div class="prod-card">
          <div class="prod-img">${p.foto_url?`<img src="${p.foto_url}" alt="${p.nome}" loading="lazy">`:'🍽️'}</div>
          <div class="prod-body">
            <div>
              <div class="prod-name">${p.nome}</div>
              <div class="prod-desc">${p.descricao||''}</div>
            </div>
            <div class="prod-foot">
              <div>
                ${p.em_promo?`<span class="promo-tag"><span class="promo-tag-icon">🏷️</span>PROMOÇÃO</span>`:''}
                <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:${p.em_promo?'3':'0'}px">
                  <span class="prod-price ${p.em_promo&&p.preco_promo&&parseFloat(p.preco_promo)>0?'promo':''}">${p.em_promo&&p.preco_promo&&parseFloat(p.preco_promo)>0?'R$ '+parseFloat(p.preco_promo).toFixed(2).replace('.',','):'R$ '+p.preco.toFixed(2).replace('.',',')}</span>
                  ${p.em_promo&&p.preco_promo&&parseFloat(p.preco_promo)>0&&parseFloat(p.preco_promo)<p.preco?'<span class="prod-price-old">R$ '+p.preco.toFixed(2).replace('.',',')+'</span>':''}
                </div>
              </div>
              <div class="qty-w">
                <button class="qb minus" id="qm${p.id}" onclick="chg(${p.id},-1,${p.preco},'${p.nome.replace(/'/g,"\\'")}')">−</button>
                <span class="qn" id="qn${p.id}">0</span>
                <button class="qb plus" onclick="chg(${p.id},1,${p.preco},'${p.nome.replace(/'/g,"\\'")}')">+</button>
              </div>
            </div>
          </div>
        </div>`).join('')}
      </div>
    </div>`).join('');
}

function chg(id,d,preco,nome,precoPromo,emPromo){
  const precoReal=(emPromo&&precoPromo)?precoPromo:preco;
  const q=(cart[id]?.quantidade||0)+d;
  if(q<=0) delete cart[id]; else cart[id]={produto_id:id,nome,preco:precoReal,precoOriginal:preco,quantidade:q};
  document.getElementById(`qn${id}`).textContent=cart[id]?.quantidade||0;
  document.getElementById(`qm${id}`)?.classList.toggle('act',!!(cart[id]?.quantidade>0));
  updateBar();
}
function chgCarrinho(id,d){
  const item=cart[id]; if(!item) return;
  const q=item.quantidade+d;
  if(q<=0) delete cart[id]; else cart[id]={...item,quantidade:q};
  const qnEl=document.getElementById(`qn${id}`);
  if(qnEl) qnEl.textContent=cart[id]?.quantidade||0;
  const qmEl=document.getElementById(`qm${id}`);
  if(qmEl) qmEl.classList.toggle('act',!!(cart[id]?.quantidade>0));
  updateBar();
  if(!Object.values(cart).length){fecharModal();return;}
  buildResumo();
}
function updateBar(){
  const its=Object.values(cart);
  const tot=its.reduce((s,i)=>s+i.preco*i.quantidade,0);
  const cnt=its.reduce((s,i)=>s+i.quantidade,0);
  document.getElementById('cartBar').classList.toggle('up',cnt>0);
  document.getElementById('cartLbl').textContent=`${cnt} ${cnt===1?'item':'itens'}`;
  document.getElementById('cartTot').textContent='R$ '+tot.toFixed(2).replace('.',',');
  document.getElementById('cartBdg').textContent=cnt;
}
function setTipo(t){
  tipoEntrega=t;
  document.getElementById('optRet').classList.toggle('sel',t==='retirada');
  document.getElementById('optEnt').classList.toggle('sel',t==='entrega');
  document.getElementById('endW').style.display=t==='entrega'?'block':'none';
  document.getElementById('freteInf').classList.toggle('show',t==='entrega');
  buildResumo();
}
function buildResumo(){
  const its=Object.values(cart);
  const sub=its.reduce((s,i)=>s+i.preco*i.quantidade,0);
  const fr=tipoEntrega==='entrega'?parseFloat(cfg.frete||0):0;
  const desc=calcDescontoCupom(sub+fr);
  const tot=Math.max(0, sub+fr-desc);
  document.getElementById('freteVal').textContent='R$ '+fr.toFixed(2).replace('.',',');
  document.getElementById('resumoBox').innerHTML=
    its.map(i=>`<div class="r-row-item">
      <span style="flex:1;font-size:13px;color:var(--tx);margin-right:8px">${i.nome}</span>
      <div class="r-ctrl">
        <button class="r-qb del" onclick="chgCarrinho(${i.produto_id},-${i.quantidade})" title="Remover">🗑</button>
        <button class="r-qb minus" onclick="chgCarrinho(${i.produto_id},-1)">−</button>
        <span style="min-width:20px;text-align:center;font-size:13px;font-weight:800">${i.quantidade}</span>
        <button class="r-qb plus" onclick="chgCarrinho(${i.produto_id},1)">+</button>
        <span style="min-width:62px;text-align:right;font-size:13px;font-weight:700;color:var(--mu)">R$ ${(i.preco*i.quantidade).toFixed(2).replace('.',',')}</span>
      </div>
    </div>`).join('')+
    (fr>0?`<div class="r-row"><span>🛵 Frete</span><span>R$ ${fr.toFixed(2).replace('.',',')}</span></div>`:'')+
    (desc>0?`<div class="r-row" style="color:var(--gr)"><span>🎟️ Cupom ${cupomAtivo?.codigo||''}</span><span>- R$ ${desc.toFixed(2).replace('.',',')}</span></div>`:'')+
    `<div class="r-tot"><span>Total</span><span>R$ ${tot.toFixed(2).replace('.',',')}</span></div>`;
}
function abrirModal(){
  if(!Object.values(cart).length) return;
  if(!lojaAberta){toast('A loja está fechada no momento!',true);return;}
  buildResumo();
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function fecharModal(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';}
async function enviar(){
  const nome=document.getElementById('inpNome').value.trim();
  const tel=document.getElementById('inpTel').value.trim();
  const obs=document.getElementById('inpObs').value.trim();
  const end=document.getElementById('inpEnd').value.trim();
  const fpag=document.getElementById('inpPgto').value;
  if(!lojaAberta){toast('A loja está fechada!',true);return;}
  if(!nome){toast('Informe seu nome!',true);return;}
  if(tel){
    const digits=tel.replace(/\D/g,'');
    if(digits.length<11){toast('WhatsApp inválido! Informe DDD (2 dígitos) + 9 dígitos. Ex: (61) 99999-9999',true);return;}
  }
  if(tipoEntrega==='entrega'&&!end){toast('Informe o endereço!',true);return;}
  const btn=document.getElementById('sendBtn'); btn.disabled=true;
  try{
    const its=Object.values(cart);
    const sub=its.reduce((s,i)=>s+i.preco*i.quantidade,0);
    const fr=tipoEntrega==='entrega'?parseFloat(cfg.frete||0):0;
    const desc=calcDescontoCupom(sub+fr);
    const obsComCupom=cupomAtivo?`${obs}${obs?' | ':''}Cupom: ${cupomAtivo.codigo} (-R$${desc.toFixed(2)})`:obs;
    const r=await fetch(`${API}/pedido`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({nome_cliente:nome,telefone:tel,observacao:obsComCupom,endereco:end,tipo_entrega:tipoEntrega,forma_pagamento:fpag,desconto_override:desc>0?desc:undefined,itens:its.map(i=>({produto_id:i.produto_id,quantidade:i.quantidade}))})});
    const d=await r.json();
    if(!r.ok){toast(d.erro||'Erro',true);return;}
    const wpp=cfg.wpp||'';
    let msg=`*Pedido ${d.pedido_id}* 🍽️\n\n*Cliente:* ${nome}\n`;
    if(tel) msg+=`*WhatsApp:* ${tel}\n`;
    msg+=`*Tipo:* ${tipoEntrega==='entrega'?'🛵 Entrega':'🏢 Retirada'}\n`;
    if(end) msg+=`*Endereço:* ${end}\n`;
    if(fpag) msg+=`*Pagamento:* ${fpag}\n`;
    if(cupomAtivo&&desc>0) msg+=`*Cupom:* ${cupomAtivo.codigo} (-R$${desc.toFixed(2)})\n`;
    msg+=`\n*Itens:*\n`;
    its.forEach(i=>msg+=`• ${i.quantidade}× ${i.nome} — R$ ${(i.preco*i.quantidade).toFixed(2).replace('.',',')}\n`);
    if(d.frete>0) msg+=`\n🛵 *Frete:* R$ ${d.frete.toFixed(2).replace('.',',')}`;
    msg+=`\n*Total: R$ ${d.total.toFixed(2).replace('.',',')}*`;
    if(obs) msg+=`\n\n_${obs}_`;
    msg+=`\n\n_Aguardando confirmação da loja..._`;
    if(wpp){
      const txt=encodeURIComponent(msg);
      const isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      // No mobile usar esquema nativo do app; no desktop usar web
      const waUrl=isMobile
        ?`whatsapp://send?phone=${wpp}&text=${txt}`
        :`https://wa.me/${wpp}?text=${txt}`;
      const link=document.createElement('a');
      link.href=waUrl;
      if(!isMobile){link.target='_blank';link.rel='noopener noreferrer';}
      document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }
    cart={};
    document.querySelectorAll('.qn').forEach(e=>e.textContent='0');
    document.querySelectorAll('.qb.minus').forEach(b=>b.classList.remove('act'));
    updateBar(); fecharModal();
    ['inpNome','inpTel','inpObs','inpEnd'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('inpPgto').value='';
    tipoEntrega='retirada'; setTipo('retirada');
    cupomAtivo=null;document.getElementById('inpCupom').value='';document.getElementById('cupomOk').classList.remove('show');document.getElementById('cupomErr').classList.remove('show');
    toast('Pedido enviado! Aguarde confirmação 🎉',false,true);
  }finally{btn.disabled=false;}
}
function toast(msg,err=false,ok=false){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(err?' err':ok?' ok':'');
  setTimeout(()=>t.classList.remove('show'),3500);
}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)fecharModal();});
load();
</script>
</body>
