version: '3.8'

services:
  db:
    image: postgres:15
    container_name: cardapio_db
    environment:
      POSTGRES_DB: cardapio
      POSTGRES_USER: cardapio
      POSTGRES_PASSWORD: cardapio123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: cardapio_app
    environment:
      DATABASE_URL: postgresql://cardapio:cardapio123@db:5432/cardapio
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/uploads
      - ./config.json:/app/config.json
    depends_on:
      - db
    restart: on-failure

volumes:
  postgres_data:
